<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Odd Duck Products</title>
 <link rel="stylesheet" href="reset.css">
 <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@2.8.0"></script>
</head>

<body>

  <header>
    <img src="img/boots.jpg" alt="Odd Duck company logo">
    <div class="header-text">
      <h1>Odd Duck Products</h1>
      <p>Which product should we make next?</p>
    </div>
  </header>

  <main>

    <aside id="results-section">
      <h2>Results</h2>
      <ul id="results-list"></ul>
    </aside>

    <div class="right-column">

      <section id="images">
        <h2>Vote for Your Favorite Product</h2>
        <img src="" alt="" id="img-left">
        <img src="" alt="" id="img-center">
        <img src="" alt="" id="img-right">
      </section>

      <section id="controls">
        <button id="view-results-btn" type="button" hidden>View Results</button>
        <button id="reset-btn" type="button" hidden>Reset</button>
        <canvas id="canvas" hidden></canvas>
      </section>

      <section id="about">
        <h2>About</h2>
        <p>Odd Duck Product Co. is always cooking up something new.
          Vote for the product you'd most like to see hit shelves —
          your input shapes what we build next.</p>
      </section>

    </div>

  </main>

  <footer>
    <p>Odd Duck Products &copy; 2026</p>
  </footer>

  <script src="app.js"></script>

</body>
</html>
