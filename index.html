<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Odd Duck Products</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@2.8.0"></script>
</head>

<body>

  <header>
    <img src="img/odd-duck-logo.png" alt="Odd Duck company logo">
    <div class="header-text">
      <h1>Odd Duck Products</h1>
      <p>Which product should we make next?</p>
    </div>
  </header>

  <main>

    <aside id="results-section">
      <h2>Results</h2>
      <ul id="results-list"></ul>
    </aside>

    <div class="right-column">

      <section id="images">
        <img src="" alt="" id="img-left">
        <img src="" alt="" id="img-center">
        <img src="" alt="" id="img-right">
      </section>

      <section id="controls">
        <button id="view-results-btn" hidden>View Results</button>
        <button id="reset-btn" hidden>Reset</button>
        <canvas id="canvas" hidden></canvas>
      </section>

      <section id="about">
        <p>Odd Duck Product Co. is always cooking up something new. 
           Vote for the product you'd most like to see hit shelves — 
           your input shapes what we build next.</p>
      </section>

    </div>

  </main>

  <footer>
    <p>Odd Duck Products &copy; 2026</p>
  </footer>

  <script type="text/javascript" src="js/app.js"></script>

</body>
</html>
